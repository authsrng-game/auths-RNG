<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>blog</title><style>body{background-color:#0e0e0e;color:#dcdcdc;font-family:monospace;margin:0;padding:28px;line-height:1.7;font-size:17px}.container{max-width:540px;margin:0 auto}h1{font-size:1.4rem;font-weight:400;letter-spacing:.06em;margin:0 0 1.2em 0;text-transform:lowercase}p{margin:0 0 1em 0;opacity:.88}.small{font-size:.95em;opacity:.65}a{color:#dcdcdc;text-decoration:none;border-bottom:1px dotted #444}a:hover{opacity:.7}.back-link{display:inline-block;margin-top:2em;padding:8px 16px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:2px;text-decoration:none;border-bottom:none}.back-link:hover{background:#222;opacity:1}</style></head><body><div class="container" id="list"><h1>blog</h1><p>loading posts…</p></div><br><br><center><a class=".back-link" href="/index.html">back</a></center><br><center><a class="small" href="https://github.com/auth1ery/fantastic-octo-waffle/">made with fow (octo)</a></center><script>fetch("/posts.json").then(t=>t.json()).then(t=>{const e=document.getElementById("list");e.innerHTML="<h1>blog</h1>",t.forEach(t=>{const n=document.createElement("p");n.innerHTML=`\n            <a href="post-s4f5.html?id=${t.id}">${t.title}</a>\n            <span class="small"> — ${t.date}</span>\n          `,e.appendChild(n)})}).catch(()=>{document.getElementById("list").innerHTML="<p>failed to load posts</p>"})</script></body></html>
