<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>leaderboard - auth's RNG</title><meta name="description" content="global leaderboard for auth's RNG"><meta name="robots" content="noindex"><style>:root{--bg:#0e0e0e;--text:#dcdcdc;--muted:#666;--border:#2a2a2a;--accent:#88dd88;--rare:#f0c070;--danger:#ff8888;--rank1:#ffd700;--rank2:#c0c0c0;--rank3:#cd7f32}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:monospace;font-size:17px;line-height:1.7;min-height:100vh;padding:28px}.container{max-width:720px;margin:0 auto}a{color:var(--text);text-decoration:none;border-bottom:1px dotted #444}a:hover{opacity:.7}h1{font-size:1.4rem;font-weight:400;letter-spacing:.06em;margin:0 0 .4em 0;text-transform:lowercase}.meta{font-size:.85em;color:var(--muted);margin-bottom:1.6em;display:flex;align-items:center;gap:14px;flex-wrap:wrap}.refresh-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.player-count{color:var(--muted);font-size:.88em}table{width:100%;border-collapse:collapse;margin-bottom:2em}thead th{text-align:left;padding:6px 10px 6px 0;font-size:.8em;color:var(--muted);border-bottom:1px dotted #333;cursor:pointer;user-select:none;white-space:nowrap;letter-spacing:.04em}thead th:hover{color:var(--text)}thead th.sorted{color:var(--accent)}tbody tr{border-bottom:1px dotted #222}tbody tr:hover{background:#141414}td{padding:8px 10px 8px 0;font-size:.88em;white-space:nowrap;vertical-align:middle}.rank-cell{color:var(--muted);font-size:.8em;width:32px}.rank-1{color:var(--rank1)}.rank-2{color:var(--rank2)}.rank-3{color:var(--rank3)}.username-cell{max-width:150px;overflow:hidden;text-overflow:ellipsis}.rarest-cell{color:var(--rare);font-size:.82em}.rarest-denom{color:var(--muted);font-size:.85em;margin-left:4px}.time-cell{color:var(--muted)}.updated-cell{color:#444;font-size:.8em}.state-box{color:var(--muted);font-size:.9em;padding:2em 0}.error-box{color:var(--danger);font-size:.85em;margin-bottom:1em;border-left:2px solid #402020;padding-left:12px}.back-link{display:inline-block;margin-top:2em;padding:8px 16px;background:#1a1a1a;border:1px solid #2a2a2a;border-bottom:1px solid #2a2a2a;border-radius:2px;font-size:.9em}.back-link:hover{background:#222;opacity:1}p.small{font-size:.85em;opacity:.65;margin-bottom:.5em}@media (max-width:500px){body{padding:16px}td,thead th{padding:6px 8px 6px 0;font-size:.8em}}</style></head><body><div class="container"><h1>leaderboard</h1><div class="meta"><span><span class="refresh-dot" id="refreshDot"></span> <span id="refreshStatus">loading...</span></span> <span id="nextRefreshLabel"></span> <span id="playerCount" class="player-count"></span></div><div id="errorBox" class="error-box" style="display:none"></div><div id="stateBox" class="state-box">fetching leaderboard...</div><table id="lbTable" style="display:none"><thead><tr><th class="rank-cell">#</th><th data-col="username">player</th><th data-col="rolls" class="sorted">rolls <span class="sort-arrow">↓</span></th><th data-col="rarities">collected</th><th data-col="rarestDenom">rarest</th><th data-col="playtime">time</th><th data-col="points">points</th><th data-col="updatedAt">updated</th></tr></thead><tbody id="lbBody"></tbody></table><p class="small">leaderboard updates every 15 minutes &nbsp;·&nbsp; opt-in from the settings page</p><a href="/" class="back-link">← back to game</a></div><script>"use strict";const API="https://leaderboard.authsrng.xyz/api/leaderboard",REFRESH_INTERVAL=9e5;let allEntries=[],sortCol="rolls",sortDir=-1,refreshTimer=null,countdownTimer=null,nextRefreshAt=0;function abbr(e){return(e=Number(e)||0)>=1e12?(e/1e12).toFixed(1).replace(/\.0$/,"")+"T":e>=1e9?(e/1e9).toFixed(1).replace(/\.0$/,"")+"B":e>=1e6?(e/1e6).toFixed(1).replace(/\.0$/,"")+"M":e>=1e3?(e/1e3).toFixed(1).replace(/\.0$/,"")+"K":String(Math.floor(e))}function fmtTime(e){return(e=Math.floor(Number(e)||0))>=86400?Math.floor(e/86400)+"d "+Math.floor(e%86400/3600)+"h":e>=3600?Math.floor(e/3600)+"h "+Math.floor(e%3600/60)+"m":e>=60?Math.floor(e/60)+"m":e+"s"}function fmtAgo(e){const t=Math.floor((Date.now()-e)/1e3);return t<60?t+"s ago":t<3600?Math.floor(t/60)+"m ago":t<86400?Math.floor(t/3600)+"h ago":Math.floor(t/86400)+"d ago"}function fmtCountdown(e){const t=Math.ceil(e/1e3);if(t<=0)return"refreshing...";const r=Math.floor(t/60);return"next refresh in "+(r>0?r+"m ":"")+t%60+"s"}function rankLabel(e){return 0===e?"#1":1===e?"#2":2===e?"#3":String(e+1)}function escHtml(e){return String(e).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function renderTable(){const e=[...allEntries].sort((e,t)=>{let r=e[sortCol],n=t[sortCol];return"username"===sortCol?(r=(r||"").toLowerCase(),n=(n||"").toLowerCase(),sortDir*r.localeCompare(n)):sortDir*((Number(r)||0)-(Number(n)||0))}),t=document.getElementById("lbBody");e.length?t.innerHTML=e.map((e,t)=>{const r=t<3?" rank-"+(t+1):"",n=e.rarestDenom>0?`${escHtml(e.rarestName||"?")}<span class="rarest-denom">1/${abbr(e.rarestDenom)}</span>`:'<span style="color:#444;">none</span>';return`<tr>\n      <td class="rank-cell${r}">${rankLabel(t)}</td>\n      <td class="username-cell">${escHtml(e.username||"?")}</td>\n      <td>${abbr(e.rolls)}</td>\n      <td>${abbr(e.rarities)}</td>\n      <td class="rarest-cell">${n}</td>\n      <td class="time-cell">${fmtTime(e.playtime)}</td>\n      <td>${abbr(e.points)}</td>\n      <td class="updated-cell">${fmtAgo(e.updatedAt)}</td>\n    </tr>`}).join(""):t.innerHTML='<tr><td colspan="8" style="color:#555;padding:24px 0;">no entries yet — be the first!</td></tr>'}async function fetchLeaderboard(){const e=document.getElementById("refreshDot"),t=document.getElementById("refreshStatus"),r=document.getElementById("errorBox"),n=document.getElementById("stateBox"),o=document.getElementById("lbTable");e.style.background="#888",t.textContent="refreshing...",r.style.display="none";try{const r=await fetch(API+"?t="+Date.now());if(!r.ok)throw new Error("HTTP "+r.status);const a=await r.json();allEntries=a.entries||[],document.getElementById("playerCount").textContent=allEntries.length+" player"+(1!==allEntries.length?"s":"")+" on the board",n.style.display="none",o.style.display="",renderTable();const l=a.cachedAt?new Date(a.cachedAt).toLocaleTimeString():"unknown";t.textContent="live · data from "+l,e.style.background="var(--accent)";const s=a.cachedAt?Date.now()-a.cachedAt:0;scheduleNext(Math.max(3e4,9e5-s))}catch(o){e.style.background="var(--danger)",t.textContent="error",r.textContent="failed to load leaderboard: "+o.message,r.style.display="block",allEntries.length||(n.textContent="couldn't load leaderboard. "+o.message),scheduleNext(6e4)}}function scheduleNext(e){clearTimeout(refreshTimer),clearInterval(countdownTimer),nextRefreshAt=Date.now()+e,refreshTimer=setTimeout(fetchLeaderboard,e);const t=document.getElementById("nextRefreshLabel");countdownTimer=setInterval(()=>{const e=nextRefreshAt-Date.now();e<=0?clearInterval(countdownTimer):t.textContent=fmtCountdown(e)},1e3)}document.querySelectorAll("thead th[data-col]").forEach(e=>{e.addEventListener("click",()=>{const t=e.dataset.col;sortCol===t?sortDir*=-1:(sortCol=t,sortDir="username"===t?1:-1),document.querySelectorAll("thead th").forEach(e=>{e.classList.remove("sorted");const t=e.querySelector(".sort-arrow");t&&t.remove()}),e.classList.add("sorted");const r=document.createElement("span");r.className="sort-arrow",r.textContent=-1===sortDir?" ↓":" ↑",e.appendChild(r),renderTable()})}),fetchLeaderboard()</script></body></html>
