<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>profile - auth's RNG</title>
		<meta name="robots" content="noindex" />
		<style>
			:root {
				--bg: #0e0e0e;
				--text: #dcdcdc;
				--muted: #666;
				--border: #2a2a2a;
				--accent: #88dd88;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				max-width: 100%;
				overflow-x: hidden;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: monospace;
				font-size: 16px;
				line-height: 1.7;
				min-height: 100vh;
				padding: 0 0 28px;
			}
			a {
				color: var(--text);
				text-decoration: none;
				border-bottom: 1px dotted #444;
			}
			a:hover {
				opacity: 0.7;
			}
			.profile-banner {
				width: 100%;
				height: 96px;
				background: #131313;
			}
			.container {
				max-width: 520px;
				margin: 0 auto;
				padding: 0 28px;
			}
			.profile-header {
				display: flex;
				align-items: center;
				gap: 16px;
				margin: 20px 0;
			}
			.avatar {
				width: 72px;
				height: 72px;
				border-radius: 50%;
				object-fit: cover;
				border: 1px solid var(--border);
				background: var(--bg);
				flex-shrink: 0;
			}
			.avatar-placeholder {
				width: 72px;
				height: 72px;
				border-radius: 50%;
				background: #1a1a1a;
				border: 1px solid var(--border);
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 1.8em;
				opacity: 0.6;
				flex-shrink: 0;
			}
			.header-text {
				min-width: 0;
			}
			.username {
				font-size: 1.3em;
				line-height: 1.2;
				overflow-wrap: break-word;
			}
			.joined {
				font-size: 0.8em;
				opacity: 0.5;
				margin-top: 4px;
			}
			.bio {
				font-size: 0.9em;
				opacity: 0.85;
				margin-bottom: 22px;
				white-space: pre-wrap;
				overflow-wrap: break-word;
				background: #131313;
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 12px 14px;
			}
			.stats-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 8px;
				margin-bottom: 22px;
			}
			.stat-card {
				background: #131313;
				border: 1px solid var(--border);
				border-radius: 3px;
				padding: 10px 12px;
				border-left: 3px solid var(--border);
				min-width: 0;
			}
			.stat-label {
				font-size: 0.7em;
				opacity: 0.4;
				margin-bottom: 3px;
				text-transform: lowercase;
				letter-spacing: 0.04em;
			}
			.stat-value {
				font-size: 1.05em;
				overflow-wrap: break-word;
			}
			.achievements-section {
				margin-bottom: 22px;
			}
			.actions {
				display: flex;
				gap: 8px;
				margin-bottom: 16px;
				flex-wrap: wrap;
			}
			button {
				background: #1a1a1a;
				color: var(--text);
				border: 1px solid var(--border);
				padding: 9px 16px;
				font-family: monospace;
				font-size: 0.9em;
				cursor: pointer;
				border-radius: 2px;
				transition: background 0.15s;
			}
			button:hover {
				background: #242424;
			}
			.status-msg {
				font-size: 0.85em;
				min-height: 1.2em;
				margin-bottom: 10px;
			}
			.back-link {
				display: inline-block;
				padding: 9px 16px;
				background: #1a1a1a;
				border: 1px solid #2a2a2a;
				border-radius: 2px;
				font-size: 0.9em;
			}
			.state-box {
				opacity: 0.5;
				padding: 2em 28px;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<div class="state-box" id="stateBox">loading profile...</div>
		</div>

		<script>
			'use strict';
			const ACCOUNTS_API = 'https://accounts.authsrng.xyz/api/accounts';
			const FRIENDS_API = 'https://accounts.authsrng.xyz/api/friends';
			const LB_API = 'https://leaderboard.authsrng.xyz/api/leaderboard';
			const HEX_COLOR_RE = /^#[0-9a-fA-F]{6}$/;

			function getToken() {
				return localStorage.getItem('authToken');
			}
			function getMyUsername() {
				return localStorage.getItem('authUsername');
			}
			function isLoggedIn() {
				return !!getToken();
			}
			function escHtml(s) {
				return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
			}

			function abbr(n) {
				n = Number(n) || 0;
				if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
				if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
				if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
				return String(Math.floor(n));
			}

			function fmtLastSeen(ts) {
				if (!ts) return null;
				const s = Math.floor((Date.now() - ts) / 1000);
				if (s < 120) return 'online now';
				if (s < 3600) return 'active ' + Math.floor(s / 60) + 'm ago';
				if (s < 86400) return 'active ' + Math.floor(s / 3600) + 'h ago';
				if (s < 604800) return 'active ' + Math.floor(s / 86400) + 'd ago';
				return 'inactive for a while';
			}

			const achievementsMeta = [
				['roller', 'Roller'],
				['gambler', 'Gambler'],
				['discordMod', 'Discord Mod'],
				['touchGrass', 'Touch Grass Please'],
				['addicted', 'Addicted'],
				['insane', 'Insane'],
				['joel', 'Joel'],
				['crazyAddicted', 'Crazy Addicted'],
				['funkyTown', 'Funky Town'],
				['outsideTime', "It's Outside Time Now"],
				['actually-addicted', 'Actually Addicted'],
				['what', '..what'],
				['devoted', 'Devoted'],
				['get-a-job', 'get a job'],
				['genuinely-insane', 'Genuinely Insane'],
				['roll-factory', 'Roll Factory'],
				['just-one-more-roll', 'Just One More Roll'],
				['got-no-life', 'Got No LIfe'],
				['introverted', 'Introverted'],
				['holy-hell', 'HOLY HELL'],
				['dude', 'dude'],
				['please-just-stop', 'PLEASE JUST STOP'],
				['you-will-pay', 'you will pay'],
				['startingOut', 'Starting Out'],
				['lucky', 'Lucky'],
				['spammin', 'Spammin'],
				['leftHanded', 'Left Handed'],
				['insanelyLucky', 'Insanely Lucky'],
				['lunar', 'Lunar'],
				['jackpot', 'Jackpot'],
				['antimatter', 'Antimatter'],
				['oh-my-god', 'oh my god'],
				['market-crash', 'Market Crash'],
				['phenomenon', 'Phenomenon'],
				['ok-bro', 'ok bro'],
				['summer', 'SUMMER'],
			].reduce((acc, [id, name]) => {
				acc[id] = name;
				return acc;
			}, {});

			const params = new URLSearchParams(location.search);
			const username = params.get('user');

			const SOCIAL_ICONS = {
				discord:
					'<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.099.246.197.373.291a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.076.076 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>',
				youtube:
					'<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6z"/></svg>',
				tiktok:
					'<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16.6 0h-3.3v16.2a3 3 0 1 1-2.1-2.9V9.9a6.2 6.2 0 1 0 5.4 6.2V8.1a8.3 8.3 0 0 0 4.9 1.6V6.4a5 5 0 0 1-4.9-4.9z"/></svg>',
				github:
					'<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.3-1.4-1.7-1.4-1.7-1.1-.8.1-.8.1-.8 1.3.1 1.9 1.3 1.9 1.3 1.1 1.9 3 1.4 3.7 1a2.3 2.3 0 0 1 .7-1.5c-2.6-.3-5.4-1.3-5.4-5.9a4.6 4.6 0 0 1 1.2-3.2 4.3 4.3 0 0 1 .1-3.2s1-.3 3.3 1.2a11.3 11.3 0 0 1 6 0c2.3-1.6 3.3-1.2 3.3-1.2a4.3 4.3 0 0 1 .1 3.2 4.6 4.6 0 0 1 1.2 3.2c0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.1.9 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3z"/></svg>',
				twitch:
					'<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M4.3 1 1 4.3v15.4h5.3V23l3.3-3.3h2.7L18.7 14V1H4.3zM17 13l-2.7 2.7h-2.7L9 18.3V15.7H5.3V2.7H17V13z"/><path d="M14.3 5.7h-1.6v5h1.6v-5zm-4.3 0H8.4v5H10v-5z"/></svg>',
			};

			const SOCIAL_LABELS = {
				discord: 'discord',
				youtube: 'youtube',
				tiktok: 'tiktok',
				github: 'github',
				twitch: 'twitch',
			};

			function buildSocialLinksHtml(socialLinks, freeformLink) {
				const items = [];

				Object.keys(SOCIAL_LABELS).forEach((platform) => {
					const entry = socialLinks && socialLinks[platform];
					if (!entry || !entry.handle) return;
					const icon = SOCIAL_ICONS[platform];
					const label = escHtml(entry.handle);
					if (entry.url) {
						items.push(
							`<a class="social-chip" href="${escHtml(entry.url)}" target="_blank" rel="noopener noreferrer">${icon}<span>${label}</span></a>`
						);
					} else {
						items.push(
							`<span class="social-chip social-chip-static" title="${SOCIAL_LABELS[platform]}">${icon}<span>${label}</span></span>`
						);
					}
				});

				if (freeformLink && freeformLink.url) {
					items.push(
						`<a class="social-chip" href="${escHtml(freeformLink.url)}" target="_blank" rel="noopener noreferrer"><span>${escHtml(freeformLink.label)}</span></a>`
					);
				}

				if (!items.length) return '';
				return `<div class="social-links">${items.join('')}</div>`;
			}

			async function init() {
				const outer = document.getElementById('container');
				if (!username) {
					outer.innerHTML =
						'<div class="state-box">no username specified. <a href="/">back to game</a></div>';
					return;
				}

				let profile, lbEntry;
				try {
					const r = await fetch(ACCOUNTS_API + '/profile/' + encodeURIComponent(username));
					if (!r.ok) throw new Error((await r.json()).error || 'user not found');
					profile = await r.json();
				} catch (e) {
					outer.innerHTML = `<div class="state-box">${escHtml(e.message)}<br><br><a href="/">back to game</a></div>`;
					return;
				}

				try {
					const r = await fetch(LB_API);
					const data = await r.json();
					lbEntry = (data.entries || []).find(
						(e) => e.username.toLowerCase() === username.toLowerCase()
					);
				} catch (_) {}

				const avatarHtml = profile.avatarUrl
					? `<img class="avatar" src="https://accounts.authsrng.xyz${profile.avatarUrl}">`
					: `<div class="avatar-placeholder">${escHtml(profile.username.charAt(0).toUpperCase())}</div>`;

				const pronounsHtml = profile.pronouns
					? `<span style="font-size:0.75em;opacity:0.5;margin-left:6px;">(${escHtml(profile.pronouns)})</span>`
					: '';

				const socialLinksHtml = buildSocialLinksHtml(profile.socialLinks, profile.freeformLink);

				const widgetHtml = {
					bio: profile.bio
						? `<div class="bio">${escHtml(profile.bio)}</div>`
						: `<div class="bio" style="opacity:0.4;font-style:italic;">no bio set</div>`,
					stats: lbEntry
						? `
		          <div class="stats-grid">
		            <div class="stat-card"><div class="stat-label">rolls</div><div class="stat-value">${abbr(lbEntry.rolls)}</div></div>
		            <div class="stat-card"><div class="stat-label">points</div><div class="stat-value">${abbr(lbEntry.points)}</div></div>
		            <div class="stat-card"><div class="stat-label">rarest</div><div class="stat-value">${escHtml(lbEntry.rarestName || 'none')}</div></div>
		            <div class="stat-card"><div class="stat-label">collected</div><div class="stat-value">${abbr(lbEntry.rarities)}</div></div>
		          </div>`
						: `<p style="font-size:0.82em;opacity:0.4;font-style:italic;margin-bottom:22px;">not on the leaderboard</p>`,
					achievements: (() => {
						const unlockedIds =
							lbEntry && Array.isArray(lbEntry.achievements) ? lbEntry.achievements : [];
						const totalAch = Object.keys(achievementsMeta).length;
						let html = `<div class="achievements-section"><div style="font-size:0.75em;opacity:0.4;margin-bottom:8px;">achievements (${unlockedIds.length} / ${totalAch})</div>`;
						if (unlockedIds.length === 0) {
							html += `<p style="font-size:0.82em;opacity:0.4;font-style:italic;">no achievements yet</p>`;
						} else {
							html += `<div style="display:flex;flex-wrap:wrap;gap:6px;">`;
							unlockedIds.forEach((id) => {
								const name = achievementsMeta[id] || id;
								html += `<span style="font-size:0.72em;padding:4px 9px;border:1px solid var(--border);border-radius:20px;background:#141414;">${escHtml(name)}</span>`;
							});
							html += `</div>`;
						}
						html += `</div>`;
						return html;
					})(),
				};

				const widgetOrder =
					profile.widgets && profile.widgets.length
						? profile.widgets
						: ['bio', 'stats', 'achievements'];
				const sectionsHtml = widgetOrder.map((w) => widgetHtml[w] || '').join('');

				const isSelf =
					isLoggedIn() &&
					getMyUsername() &&
					getMyUsername().toLowerCase() === username.toLowerCase();
				let actionsHtml = '';
				if (isLoggedIn() && !isSelf) {
					actionsHtml = `<div class="actions">
		            <button id="addFriendBtn">add friend</button>
		            <button id="messageBtn">message</button>
		          </div>
		          <div class="status-msg" id="actionStatus"></div>`;
				}

				const theme = profile.theme || { bannerType: 'none', accentColor: '#dcdcdc' };
				let bannerStyle;
				if (profile.bannerImageUrl) {
					bannerStyle = `background-image:url('https://accounts.authsrng.xyz${profile.bannerImageUrl}');background-size:cover;background-position:center;`;
				} else if (theme.bannerType === 'solid' && theme.bannerColor1) {
					bannerStyle = `background:${theme.bannerColor1};`;
				} else if (theme.bannerType === 'gradient' && theme.bannerColor1 && theme.bannerColor2) {
					bannerStyle = `background:linear-gradient(135deg, ${theme.bannerColor1}, ${theme.bannerColor2});`;
				} else {
					bannerStyle = 'background:#131313;';
				}
				const accent = HEX_COLOR_RE.test(theme.accentColor || '') ? theme.accentColor : '#dcdcdc';

				outer.innerHTML = `
					<div class="profile-banner" style="${bannerStyle}"></div>
					<div class="container">
						<div class="profile-header">
							${avatarHtml}
							<div class="header-text">
								<div class="username" style="color:${accent};">${escHtml(profile.username)}${pronounsHtml}</div>
								<div class="joined">joined ${new Date(profile.createdAt).toLocaleDateString()}${profile.lastSeenAt ? ' · ' + escHtml(fmtLastSeen(profile.lastSeenAt)) : ''}</div>
							</div>
						</div>
						${socialLinksHtml}
						${sectionsHtml}
						${actionsHtml}
						<div style="display:flex;gap:8px;margin-top:1em;">
							<a href="/" class="back-link">← back to game</a>
							<button id="copyLinkBtn">copy link</button>
						</div>
					</div>
				`;

				document.querySelectorAll('.stat-card').forEach((card) => {
					card.style.borderLeftColor = accent;
				});

				const copyBtn = document.getElementById('copyLinkBtn');
				if (copyBtn) {
					copyBtn.addEventListener('click', () => {
						const shareUrl = 'https://accounts.authsrng.xyz/u/' + encodeURIComponent(username);
						navigator.clipboard
							.writeText(shareUrl)
							.then(() => {
								copyBtn.textContent = 'copied!';
								setTimeout(() => {
									copyBtn.textContent = 'copy link';
								}, 1500);
							})
							.catch(() => {
								copyBtn.textContent = 'failed to copy';
							});
					});
				}

				if (isLoggedIn() && !isSelf) {
					document.getElementById('addFriendBtn').addEventListener('click', async () => {
						const status = document.getElementById('actionStatus');
						try {
							status.style.color = '';
							status.textContent = 'sending request...';
							const r = await fetch(FRIENDS_API + '/request', {
								method: 'POST',
								headers: {
									'Content-Type': 'application/json',
									Authorization: 'Bearer ' + getToken(),
								},
								body: JSON.stringify({ username: profile.username }),
							});
							const data = await r.json();
							if (!r.ok) throw new Error(data.error || 'failed');
							status.style.color = '#8d8';
							status.textContent = 'friend request sent!';
						} catch (e) {
							status.style.color = '#f66';
							status.textContent = e.message;
						}
					});

					document.getElementById('messageBtn').addEventListener('click', () => {
						location.href = '/?compose=' + encodeURIComponent(profile.username);
					});
				}
			}

			init();
		</script>
	</body>
</html>
