<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>auth's RNG</title>
		<meta property="og:type" content="game" />
		<meta property="og:title" content="auth's rng" />
		<meta
			property="og:description"
			content="a lite version of the simple web based rng game, auth's RNG!"
		/>
		<meta property="og:image" content="https://i.imgur.com/NXSTPVu.png" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#000000" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta http-equiv="X-UA-Compatible" content="IE=EmulateIE7" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				background: #121212;
				color: #eee;
				font-family: arial, sans-serif;
				text-align: center;
				padding: 1rem;
				min-height: 100vh;
				user-select: none;
				-webkit-user-select: none;
				-moz-user-select: none;
				-ms-user-select: none;
				overflow-x: hidden;
			}
			h1 {
				font-size: 2rem;
				margin: 0.5rem 0;
			}
			p {
				color: #bbb;
				max-width: 400px;
				margin: 0 auto 1rem;
				font-size: 1.1rem;
			}
			button {
				background: #fff;
				color: #000;
				border: none;
				border-radius: 8px;
				padding: 0.75rem 2rem;
				font-size: 1.5rem;
				font-weight: 600;
				cursor: pointer;
				margin: 0.5rem;
			}
			button:disabled {
				background: #ccc;
				color: #555;
				cursor: not-allowed;
			}
			#spinnerContainer {
				height: 3rem;
				width: 300px;
				overflow: hidden;
				position: relative;
				border: 2px solid #444;
				border-radius: 8px;
				background: #1e1e1e;
				margin: 0 auto 1.5rem;
			}
			#spinner {
				position: absolute;
				top: 0;
				width: 100%;
				transition: transform 0.8s ease-out;
			}
			.spin-item {
				height: 3rem;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 1.25rem;
				font-weight: bold;
				color: #fff;
			}
			#totalRolls {
				margin: 0.5rem 0;
				font-size: 1.2rem;
				font-weight: 600;
			}
			#inventoryList {
				list-style: none;
				max-width: 400px;
				margin: 0 auto;
				color: #ddd;
				font-weight: 600;
				max-height: 250px;
				overflow-y: auto;
			}
			#inventoryList li {
				margin: 0.35rem 0;
				padding: 0.25rem 0.5rem;
				border-radius: 4px;
			}
			#inventoryList li.new-roll {
				background: #444;
			}
			#resetBtn {
				background: #fff;
				color: red;
				font-size: 1rem;
				margin-top: 1rem;
			}
			#achievementsContainer {
				margin: 2rem auto 0;
				max-width: 400px;
				border: 2px solid #444;
				border-radius: 8px;
				background: #1e1e1e;
				padding: 1rem;
				max-height: 300px;
				overflow-y: auto;
			}
			.achievement {
				margin-bottom: 0.6rem;
				padding: 0.4rem 0.5rem;
				border-radius: 6px;
				background: #292929;
			}
			.achievement.unlocked {
				background: #0a7a0a;
				color: #b5f0b5;
			}
			.achievement-name {
				font-weight: 700;
				font-size: 1.15rem;
			}
			.achievement-subtitle {
				font-weight: 400;
				opacity: 0.7;
				font-size: 0.9rem;
				font-style: italic;
			}
			#settingsBtn {
				position: fixed;
				top: 10px;
				right: 10px;
				background: #333;
				color: #fff;
				padding: 0.5rem 1rem;
				font-size: 1rem;
				z-index: 9999;
			}
			#settingsPanel {
				position: fixed;
				top: 60px;
				right: 10px;
				background: #1e1e1e;
				color: #eee;
				padding: 1rem;
				border: 2px solid #555;
				border-radius: 8px;
				width: 250px;
				display: none;
				z-index: 9998;
			}
			#settingsPanel.open {
				display: block;
			}
			#settingsPanel label {
				display: block;
				margin-top: 0.5rem;
				font-size: 0.9rem;
			}
			#settingsPanel select,
			#settingsPanel input {
				width: 100%;
				margin-top: 0.2rem;
			}
			#playtimeDisplay {
				margin-top: 1.5rem;
				font-size: 1rem;
				color: #aaa;
				font-style: italic;
			}
		</style>
	</head>
	<body>
		<h1>welcome to auth's RNG!</h1>
		<p>a lite version of auth's RNG, built for old browsers and old devices!</p>

		<button id="rollBtn">roll</button>
		<div id="spinnerContainer"><div id="spinner"></div></div>

		<div style="margin: 1.5rem auto; max-width: 400px">
			<p
				id="totalRolls"
				style="font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem"
			>
				total rolls: 0
			</p>
			<div id="playtimeDisplay">total playtime: 0s</div>
		</div>

		<ul id="inventoryList"></ul>
		<button id="resetBtn">reset data</button>
		<div id="achievementsContainer"></div>

		<button id="settingsBtn">settings</button>
		<div id="settingsPanel">
			<label>theme:</label>
			<select id="themeSelect">
				<option value="black">black (default)</option>
				<option value="white">white</option>
			</select>
			<label><input type="checkbox" id="rgbBg" /> rgb background</label>
		</div>

		<p style="font-size: 0.85rem; color: #bbb; margin-top: 2rem">
			version 1.0 lite. based off of version 5.5 in main game.
		</p>

		<script>
			(function () {
				'use strict';

				// polyfills for ie
				if (!Array.from) {
					Array.from = function (arr) {
						var result = [];
						for (var i = 0; i < arr.length; i++) result.push(arr[i]);
						return result;
					};
				}
				if (!Array.prototype.forEach) {
					Array.prototype.forEach = function (fn) {
						for (var i = 0; i < this.length; i++) fn(this[i], i, this);
					};
				}
				if (!Array.prototype.map) {
					Array.prototype.map = function (fn) {
						var result = [];
						for (var i = 0; i < this.length; i++) result.push(fn(this[i], i, this));
						return result;
					};
				}
				if (!Array.prototype.find) {
					Array.prototype.find = function (fn) {
						for (var i = 0; i < this.length; i++) {
							if (fn(this[i], i, this)) return this[i];
						}
					};
				}

				// dom elements
				var rollBtn = document.getElementById('rollBtn');
				var spinner = document.getElementById('spinner');
				var inventoryList = document.getElementById('inventoryList');
				var resetBtn = document.getElementById('resetBtn');
				var totalRollsEl = document.getElementById('totalRolls');
				var achievementsContainer = document.getElementById('achievementsContainer');
				var settingsBtn = document.getElementById('settingsBtn');
				var settingsPanel = document.getElementById('settingsPanel');
				var themeSelect = document.getElementById('themeSelect');
				var rgbBg = document.getElementById('rgbBg');
				var playtimeDisplay = document.getElementById('playtimeDisplay');

				// storage keys
				var STORAGE_KEY = 'rarityInventory';
				var TOTAL_ROLLS_KEY = 'totalRolls';
				var ACHIEVEMENTS_KEY = 'achievementsUnlocked';
				var PLAYTIME_KEY = 'totalPlaytime';
				var SETTINGS_KEY = 'userSettings';

				// state
				var totalRolls = 0;
				var inventoryData = {};
				var achievementsUnlocked = {};
				var totalSeconds = 0;
				var rgbInterval = null;

				// rarities (optimized)
				var rarities = [
					{ name: 'paradox', chance: 1 / 2000 },
					{ name: 'duration', chance: 1 / 1950 },
					{ name: 'despair', chance: 1 / 1900 },
					{ name: 'lucid', chance: 1 / 1870 },
					{ name: 'wildfire', chance: 1 / 1854 },
					{ name: 'insanity', chance: 1 / 1800 },
					{ name: 'purpose', chance: 1 / 1750 },
					{ name: 'lunarity', chance: 1 / 1700 },
					{ name: 'constellation', chance: 1 / 1600 },
					{ name: 'eclipse', chance: 1 / 1500 },
					{ name: '<>', chance: 1 / 1466 },
					{ name: 'inferno', chance: 1 / 1444 },
					{ name: 'tempered', chance: 1 / 1425 },
					{ name: 'grayscale', chance: 1 / 1400 },
					{ name: 'constant', chance: 1 / 1350 },
					{ name: 'gladiator', chance: 1 / 1300 },
					{ name: 'amethyst', chance: 1 / 1260 },
					{ name: 'cobalt', chance: 1 / 1230 },
					{ name: 'terrifying', chance: 1 / 1200 },
					{ name: 'divine', chance: 1 / 1050 },
					{ name: 'lunar', chance: 1 / 1000 },
					{ name: 'appalled', chance: 1 / 950 },
					{ name: 'dreamy', chance: 1 / 930 },
					{ name: 'catastrophic', chance: 1 / 900 },
					{ name: 'equations', chance: 1 / 830 },
					{ name: 'tidal', chance: 1 / 800 },
					{ name: 'lucky', chance: 1 / 777 },
					{ name: 'merciful', chance: 1 / 700 },
					{ name: 'divinity', chance: 1 / 600 },
					{ name: 'storm', chance: 1 / 550 },
					{ name: 'glass', chance: 1 / 520 },
					{ name: 'lazer', chance: 1 / 500 },
					{ name: 'astral', chance: 1 / 400 },
					{ name: 'chroma', chance: 1 / 300 },
					{ name: 'theory', chance: 1 / 250 },
					{ name: 'crazy', chance: 1 / 200 },
					{ name: 'lapis', chance: 1 / 170 },
					{ name: 'fabled', chance: 1 / 150 },
					{ name: 'rainbow', chance: 1 / 100 },
					{ name: 'distorted', chance: 1 / 90 },
					{ name: 'hardcore', chance: 1 / 80 },
					{ name: 'legendary', chance: 1 / 70 },
					{ name: 'neon', chance: 1 / 60 },
					{ name: 'amazing', chance: 1 / 50 },
					{ name: 'voltage', chance: 1 / 47 },
					{ name: 'epic', chance: 1 / 45 },
					{ name: 'formula', chance: 1 / 37 },
					{ name: 'rare', chance: 1 / 35 },
					{ name: 'apple', chance: 1 / 33 },
					{ name: 'good', chance: 1 / 30 },
					{ name: 'cherry', chance: 1 / 23 },
					{ name: 'decent', chance: 1 / 20 },
					{ name: 'cool', chance: 1 / 10 },
					{ name: 'blown', chance: 1 / 7 },
					{ name: 'garbage', chance: 1 / 5 },
					{ name: 'common', chance: 1 / 2 },
				];

				// achievements
				var achievementsList = [
					{
						id: 'roller',
						name: 'roller',
						subtitle: 'get 100 rolls',
						check: function () {
							return totalRolls >= 100;
						},
					},
					{
						id: 'gambler',
						name: 'gambler',
						subtitle: 'get 200 rolls',
						check: function () {
							return totalRolls >= 200;
						},
					},
					{
						id: 'discordMod',
						name: 'discord mod',
						subtitle: 'get 300 rolls',
						check: function () {
							return totalRolls >= 300;
						},
					},
					{
						id: 'touchGrass',
						name: 'touch grass please',
						subtitle: 'get 400 rolls',
						check: function () {
							return totalRolls >= 400;
						},
					},
					{
						id: 'addicted',
						name: 'addicted',
						subtitle: 'get 500 rolls',
						check: function () {
							return totalRolls >= 500;
						},
					},
					{
						id: 'insane',
						name: 'insane',
						subtitle: 'get 600 rolls',
						check: function () {
							return totalRolls >= 600;
						},
					},
					{
						id: 'joel',
						name: 'joel',
						subtitle: 'get 700 rolls',
						check: function () {
							return totalRolls >= 700;
						},
					},
					{
						id: 'crazyAddicted',
						name: 'crazy addicted',
						subtitle: 'get 800 rolls',
						check: function () {
							return totalRolls >= 800;
						},
					},
					{
						id: 'funkyTown',
						name: 'funky town',
						subtitle: 'get 900 rolls',
						check: function () {
							return totalRolls >= 900;
						},
					},
					{
						id: 'outsideTime',
						name: "it's outside time now",
						subtitle: 'get 1000 rolls',
						check: function () {
							return totalRolls >= 1000;
						},
					},
					{
						id: 'startingOut',
						name: 'starting out',
						subtitle: 'get a rarity under 1/70',
						check: function (r) {
							return r && 1 / r.chance < 70;
						},
					},
					{
						id: 'lucky',
						name: 'lucky',
						subtitle: 'get a rarity above 1/70',
						check: function (r) {
							return r && 1 / r.chance > 70;
						},
					},
					{
						id: 'spammin',
						name: 'spammin',
						subtitle: 'get a rarity above 1/300',
						check: function (r) {
							return r && 1 / r.chance > 300;
						},
					},
					{
						id: 'leftHanded',
						name: 'left handed',
						subtitle: 'get a rarity above 1/600',
						check: function (r) {
							return r && 1 / r.chance > 600;
						},
					},
					{
						id: 'insanelyLucky',
						name: 'insanely lucky',
						subtitle: 'get a rarity above 1/800',
						check: function (r) {
							return r && 1 / r.chance > 800;
						},
					},
					{
						id: 'lunar',
						name: 'lunar',
						subtitle: 'get lunar',
						check: function (r) {
							return r && r.name === 'lunar';
						},
					},
				];

				// save data
				function saveAllData() {
					try {
						var arr = [];
						for (var key in inventoryData) {
							if (inventoryData.hasOwnProperty(key)) {
								var d = inventoryData[key];
								arr.push({ name: d.rarityObj.name, chance: d.rarityObj.chance, count: d.count });
							}
						}
						localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
						localStorage.setItem(TOTAL_ROLLS_KEY, totalRolls.toString());

						var achArr = [];
						for (var id in achievementsUnlocked) {
							if (achievementsUnlocked[id]) achArr.push(id);
						}
						localStorage.setItem(ACHIEVEMENTS_KEY, JSON.stringify(achArr));
					} catch (e) {}
				}

				// load data
				function loadAllData() {
					try {
						var sr = localStorage.getItem(TOTAL_ROLLS_KEY);
						if (sr) {
							totalRolls = parseInt(sr, 10) || 0;
							updateTotalRolls();
						}

						var sv = localStorage.getItem(STORAGE_KEY);
						if (sv) {
							var items = JSON.parse(sv);
							for (var i = 0; i < items.length; i++) {
								var item = items[i];
								var o = findRarity(item.name);
								if (o) {
									var li = document.createElement('li');
									inventoryData[o.name] = { rarityObj: o, count: item.count, liElement: li };
									updateItem(inventoryData[o.name]);
									inventoryList.appendChild(li);
								}
							}
						}

						var sa = localStorage.getItem(ACHIEVEMENTS_KEY);
						if (sa) {
							var arr = JSON.parse(sa);
							for (var j = 0; j < arr.length; j++) {
								achievementsUnlocked[arr[j]] = true;
							}
						}

						var sp = localStorage.getItem(PLAYTIME_KEY);
						if (sp) totalSeconds = parseInt(sp, 10) || 0;

						updateAchievementsUI();
					} catch (e) {}
				}

				function findRarity(name) {
					for (var i = 0; i < rarities.length; i++) {
						if (rarities[i].name === name) return rarities[i];
					}
					return null;
				}

				function updateTotalRolls() {
					totalRollsEl.textContent = 'total rolls: ' + totalRolls;
				}

				function addToInventory(o) {
					if (inventoryData[o.name]) {
						var d = inventoryData[o.name];
						d.count++;
						updateItem(d);
					} else {
						var li = document.createElement('li');
						inventoryData[o.name] = { rarityObj: o, count: 1, liElement: li };
						updateItem(inventoryData[o.name]);
						inventoryList.appendChild(li);
					}
					inventoryList.scrollTop = inventoryList.scrollHeight;
				}

				function updateItem(d) {
					var denom = Math.round(1 / d.rarityObj.chance);
					d.liElement.textContent =
						d.count > 1
							? d.rarityObj.name + ' (1/' + denom + ') x' + d.count
							: d.rarityObj.name + ' (1/' + denom + ')';
					d.liElement.className = 'new-roll';
					setTimeout(function () {
						d.liElement.className = '';
					}, 2000);
				}

				function getRandomRarity() {
					var totalWeight = 0;
					for (var i = 0; i < rarities.length; i++) totalWeight += rarities[i].chance;
					var rand = Math.random() * totalWeight;
					for (var j = 0; j < rarities.length; j++) {
						rand -= rarities[j].chance;
						if (rand <= 0) return rarities[j];
					}
					return rarities[rarities.length - 1];
				}

				function checkAchievements(currentRarity) {
					var newlyUnlocked = false;
					for (var i = 0; i < achievementsList.length; i++) {
						var ach = achievementsList[i];
						if (!achievementsUnlocked[ach.id]) {
							if (ach.check(currentRarity)) {
								achievementsUnlocked[ach.id] = true;
								newlyUnlocked = true;
							}
						}
					}
					if (newlyUnlocked) {
						updateAchievementsUI();
						saveAllData();
					}
				}

				function updateAchievementsUI() {
					achievementsContainer.innerHTML = '';
					for (var i = 0; i < achievementsList.length; i++) {
						var ach = achievementsList[i];
						var unlocked = achievementsUnlocked[ach.id];
						var div = document.createElement('div');
						div.className = 'achievement' + (unlocked ? ' unlocked' : '');
						var nameEl = document.createElement('div');
						nameEl.className = 'achievement-name';
						nameEl.textContent = ach.name;
						var subEl = document.createElement('div');
						subEl.className = 'achievement-subtitle';
						subEl.textContent = ach.subtitle;
						div.appendChild(nameEl);
						div.appendChild(subEl);
						achievementsContainer.appendChild(div);
					}
				}

				function resetInventory() {
					if (confirm('are you sure that you will delete your sweet sweet data???')) {
						try {
							localStorage.removeItem(STORAGE_KEY);
							localStorage.removeItem(TOTAL_ROLLS_KEY);
							localStorage.removeItem(ACHIEVEMENTS_KEY);
						} catch (e) {}
						inventoryData = {};
						achievementsUnlocked = {};
						inventoryList.innerHTML = '';
						updateAchievementsUI();
						totalRolls = 0;
						updateTotalRolls();
					}
				}

				function spinAndReveal(res) {
					spinner.innerHTML = '';
					var items = [];
					for (var i = 0; i < 50; i++) {
						items.push(rarities[Math.floor(Math.random() * rarities.length)]);
					}
					items.push(res);

					for (var j = 0; j < items.length; j++) {
						var d = document.createElement('div');
						d.className = 'spin-item';
						d.textContent = items[j].name;
						spinner.appendChild(d);
					}

					var h = 48;
					var scroll = h * (items.length - 1);
					spinner.style.transform = 'translateY(-' + scroll + 'px)';

					setTimeout(function () {
						totalRolls++;
						updateTotalRolls();
						addToInventory(res);
						checkAchievements(res);
						rollBtn.disabled = false;
						saveAllData();
					}, 2100);
				}

				// playtime
				function formatTime(seconds) {
					var h = Math.floor(seconds / 3600);
					var m = Math.floor((seconds % 3600) / 60);
					var s = seconds % 60;
					var parts = [];
					if (h > 0) parts.push(h + 'h');
					if (m > 0) parts.push(m + 'm');
					parts.push(s + 's');
					return parts.join(' ');
				}

				function updatePlaytimeDisplay() {
					playtimeDisplay.textContent = 'total playtime: ' + formatTime(totalSeconds);
				}

				setInterval(function () {
					totalSeconds++;
					try {
						localStorage.setItem(PLAYTIME_KEY, totalSeconds.toString());
					} catch (e) {}
					updatePlaytimeDisplay();
				}, 1000);

				// settings
				function applySettings() {
					var theme = themeSelect.value;
					var rgb = rgbBg.checked;

					if (rgbInterval) {
						clearInterval(rgbInterval);
						rgbInterval = null;
					}

					if (rgb) {
						rgbInterval = setInterval(function () {
							var h = Math.floor(Math.random() * 360);
							document.body.style.background = 'hsl(' + h + ', 70%, 15%)';
						}, 150);
					} else {
						document.body.style.background = theme === 'white' ? '#fff' : '#121212';
						document.body.style.color = theme === 'white' ? '#000' : '#eee';
					}

					try {
						localStorage.setItem(SETTINGS_KEY, JSON.stringify({ theme: theme, rgb: rgb }));
					} catch (e) {}
				}

				function loadSettings() {
					try {
						var saved = localStorage.getItem(SETTINGS_KEY);
						if (saved) {
							var settings = JSON.parse(saved);
							themeSelect.value = settings.theme || 'black';
							rgbBg.checked = settings.rgb || false;
							applySettings();
						}
					} catch (e) {}
				}

				// event listeners
				rollBtn.addEventListener('click', function () {
					rollBtn.disabled = true;
					spinner.style.transition = 'none';
					spinner.style.transform = 'translateY(0)';
					var res = getRandomRarity();
					setTimeout(function () {
						spinAndReveal(res);
					}, 100);
				});

				resetBtn.addEventListener('click', resetInventory);

				settingsBtn.addEventListener('click', function () {
					settingsPanel.className = settingsPanel.className === 'open' ? '' : 'open';
				});

				themeSelect.addEventListener('change', applySettings);
				rgbBg.addEventListener('change', applySettings);

				// init
				loadAllData();
				loadSettings();
