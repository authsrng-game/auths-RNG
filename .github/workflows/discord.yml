name: discord notify

on:
  push:
    branches: [ "**" ]

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: send push to discord
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"push: auths-RNG@${{ github.ref_name }}\ncommit: ${{ github.sha }}\nurl: https://git.authsrng.xyz/auths-RNG.git/commit/?h=${{ github.ref_name }}&id=${{ github.sha }}\nauthor: ${{ github.actor }}\nmessage: ${{ github.event.head_commit.message }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}